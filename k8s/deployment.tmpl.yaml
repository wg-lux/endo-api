apiVersion: apps/v1
kind: Deployment
metadata:
  name: endo-api
  namespace: endo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: endo-api
  template:
    metadata:
      labels:
        app: endo-api
      annotations:
        build-timestamp: "${BUILD_TS}"
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: api
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8118
          envFrom:
            - secretRef:
                name: endo-api-secrets
            - configMapRef:
                name: endo-api-config
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.prod
          readinessProbe:
            httpGet:
              path: /
              port: 8118
              httpHeaders:
                - name: Host
                  value: endo-api.endo-api.svc.cluster.local
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /
              port: 8118
              httpHeaders:
                - name: Host
                  value: endo-api.endo-api.svc.cluster.local
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "3"
              memory: 16Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: endo-api-data
