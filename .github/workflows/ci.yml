name: CI

on:
  push:
    branches: [main, container]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: uv sync
      - name: Lint importable modules
        run: python -c "import endo_api; print('import ok')"
      - name: Run unit tests (pytest)
        run: uv run pytest -q
      - name: Check Nix syntax
        run: |
          nix --version || true
          nix-instantiate --parse app_config.nix
          nix-instantiate --parse devenv.nix
